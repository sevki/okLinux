# Build the ChromeOS kernel and publish a release, then update the website

name: Build Kernel

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      kernel_release: ${{ steps.meta.outputs.kernel_release }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      tarball_name: ${{ steps.meta.outputs.tarball_name }}
    env:
      MDBOOK_VERSION: "0.4.36"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Clone kernel source to discover the upstream commit
          git clone --depth 1 -b chromeos-6.6 \
            https://chromium.googlesource.com/chromiumos/third_party/kernel \
            kernel
          SHORT_SHA=$(git -C kernel rev-parse --short HEAD)
          KERNEL_RELEASE=$(make -C kernel -s kernelrelease 2>/dev/null || echo "unknown")
          TAG="kernel-${KERNEL_RELEASE}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if gh release view "${TAG}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping build."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release ${TAG} does not exist, proceeding with build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build kernel
        if: steps.check.outputs.exists == 'false'
        id: meta
        run: bash build.sh

      - name: Upload artifact
        if: steps.check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build
          path: |
            oklinux-kernel-*.tar.gz
            oklinux-kernel-*.tar.gz.sha256

      - name: Publish GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="kernel-${{ steps.meta.outputs.kernel_release }}-${{ steps.meta.outputs.short_sha }}"
          TARBALL="${{ steps.meta.outputs.tarball_name }}"

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "Kernel ${TAG}" \
            --notes "Automated kernel build from chromeos-6.6 branch.

          - Kernel release: \`${{ steps.meta.outputs.kernel_release }}\`
          - Upstream commit: \`${{ steps.meta.outputs.commit_sha }}\`" \
            "${TARBALL}" "${TARBALL}.sha256"

      - name: Update kernel-version.txt
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="kernel-${{ steps.meta.outputs.kernel_release }}-${{ steps.meta.outputs.short_sha }}"
          VERSION="${{ steps.meta.outputs.kernel_release }}"
          echo "${VERSION}" > kernel-version.txt

      - name: Commit version bump
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet kernel-version.txt 2>/dev/null; then
            git add kernel-version.txt
            git commit -m "chore: bump kernel version"
            git push
          fi
