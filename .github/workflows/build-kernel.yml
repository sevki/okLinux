# Build the ChromeOS kernel and publish a release

name: Build Kernel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      kernel_release: ${{ steps.meta.outputs.kernel_release }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      tarball_name: ${{ steps.meta.outputs.tarball_name }}
      bzimage_asset: ${{ steps.meta.outputs.bzimage_asset }}
      vmlinux_asset: ${{ steps.meta.outputs.vmlinux_asset }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if release already exists
        id: check
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Clone kernel source to discover the upstream commit
          git clone --depth 1 -b chromeos-6.6 \
            https://chromium.googlesource.com/chromiumos/third_party/kernel \
            kernel
          SHORT_SHA=$(git -C kernel rev-parse --short HEAD)
          KERNEL_RELEASE=$(make -C kernel -s kernelrelease 2>/dev/null || echo "unknown")
          TAG="kernel-${KERNEL_RELEASE}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if gh release view "${TAG}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping build."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release ${TAG} does not exist, proceeding with build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build kernel
        if: github.event_name == 'pull_request' || steps.check.outputs.exists == 'false'
        id: meta
        run: bash build.sh

      - name: Upload artifact
        if: github.event_name == 'pull_request' || steps.check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build
          path: |
            oklinux-kernel-*.tar.gz
            oklinux-kernel-*.tar.gz.sha256
            oklinux-bzImage-x86_64-*
            oklinux-vmlinux-x86_64-*

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request' && steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="kernel-${{ steps.meta.outputs.kernel_release }}-${{ steps.meta.outputs.short_sha }}"
          TARBALL="${{ steps.meta.outputs.tarball_name }}"
          BZIMAGE="${{ steps.meta.outputs.bzimage_asset }}"
          VMLINUX="${{ steps.meta.outputs.vmlinux_asset }}"

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "Kernel ${TAG}" \
            --notes "Automated kernel build from chromeos-6.6 branch.

          - Kernel release: \`${{ steps.meta.outputs.kernel_release }}\`
          - Upstream commit: \`${{ steps.meta.outputs.commit_sha }}\`" \
            "${TARBALL}" "${TARBALL}.sha256" "${BZIMAGE}" "${VMLINUX}"

      - name: Update kernel-version.txt
        if: github.event_name != 'pull_request' && steps.check.outputs.exists == 'false'
        run: |
          TAG="kernel-${{ steps.meta.outputs.kernel_release }}-${{ steps.meta.outputs.short_sha }}"
          VERSION="${{ steps.meta.outputs.kernel_release }}"
          echo "${VERSION}" > kernel-version.txt

      - name: Commit version bump
        if: github.event_name != 'pull_request' && steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet kernel-version.txt 2>/dev/null; then
            git add kernel-version.txt
            git commit -m "chore: bump kernel version"
            git push
          fi
